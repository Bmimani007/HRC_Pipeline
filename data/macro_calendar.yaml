  - date: "2026-05-29"
    name: "US PCE Deflator — April 2026"
    country: USA
    impact: HIGH
    category: inflation
    consensus: "Core PCE MoM and YoY; Fed's preferred gauge"
    affects_regions: [china, india]
    primary_channel: dxy_to_iron_ore
    mechanism: |
      PCE is the Fed's preferred inflation measure. Released ~2.5 weeks
      before June FOMC, it pre-positions the rate decision. Same DXY → iron
      ore chain as CPI, but with greater market reaction because it directly
