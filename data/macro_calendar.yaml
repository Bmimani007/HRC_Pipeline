    name: "China Trade Balance — April 2026"
    country: CHN
    impact: MED
    category: china_macro
    consensus: "Surplus/deficit signals export demand absorption"
    affects_regions: [china, india]
    primary_channel: china_export_intent
    mechanism: |
      China's trade surplus is a real-time indicator of external demand
      absorption. A widening surplus signals strong global willingness to
      absorb Chinese exports — including steel exports. A narrowing surplus
      signals export weakness, which in turn signals Chinese mills will
      redirect output to domestic market, *increasing China FOB price
      competition* and *raising risk of Chinese export dumping into India*.
    expected_hrc_reaction: |
      Surplus narrowing significantly → bearish for India HRC FBD via import
      pressure (-INR 500-1500/t over 30 days). Surplus expanding → benign
      for both regions; supports the "demand absorption" thesis.

  - date: "2026-05-09"
    name: "China CPI/PPI — April 2026"
    country: CHN
    impact: MED
    category: inflation
    consensus: "Domestic inflation; PPI especially relevant for industrial demand"
    affects_regions: [china]
    primary_channel: china_demand_direct
    mechanism: |
      Chinese PPI is a direct indicator of industrial-sector pricing power.
      Sustained PPI deflation (negative YoY) signals manufacturing margin
      pressure and softening industrial demand — bearish for steel
      consumption. Strengthening PPI suggests recovering pricing power
      across upstream manufacturing, supportive of steel demand.
    expected_hrc_reaction: |
      PPI worsening (more deeply negative YoY) → reinforces bearish HRC
      China FOB thesis if combined with weak IP. PPI improving → supportive.
      Standalone reaction modest (1-2% iron ore over 1 week).

  - date: "2026-05-12"
    name: "US CPI — April 2026"
    country: USA
    impact: HIGH
    category: inflation
    consensus: "Sets June FOMC rate path expectation"
    affects_regions: [china, india]
    primary_channel: dxy_to_iron_ore
    mechanism: |
      Post-Mega-Week CPI: the April print sets the trajectory for the June
      16-17 FOMC. Hot CPI keeps Fed hawkish → DXY strength → iron ore
      weakens. For China FOB: marginal raw-material cost relief, neutral-
      to-positive for spread. For India: USD strength weakens INR → import
      HCC INR cost rises → India spread compression risk.
    expected_hrc_reaction: |
      Hot surprise (>3.0% headline): iron ore -2 to -4% in 5 trading days,
      HRC China FOB modestly weaker over 30 days, India spread compresses
      INR 500-1000/t. Cool surprise (<2.6%): iron ore +2 to +5%, China
      FOB firms, India spread benefits from INR strength.

