# =============================================================================
# HRC Macro Event Calendar — MASTER EVENT LIBRARY
# =============================================================================
# This is your master library of HRC-relevant macro events. The pipeline
# automatically filters to events between TODAY and TODAY + 45 DAYS at runtime.
# You don't need to update window dates — only add/remove events.
#
# WHAT TO EDIT:
#   • Add new events as you learn about them (FOMC, ECB, scheduled releases).
#     Keep at least 2-3 months ahead populated.
#   • Past events can stay in the file — the rolling filter ignores them.
#     They make useful templates for next month's recurring events.
#   • Once a month: scan ForexFactory or your manager's reports, add ~10-15
#     new events for the month after.
#
# WHAT NOT TO EDIT:
#   • The structure (date, name, etc. — pipeline expects these keys).
#   • The 'category' values — must be one of:
#         inflation, central_bank, employment, gdp, manufacturing,
#         consumer, china_macro, commodity_supply, geopolitical
#
# IMPACT TIERS:
#   HIGH = expect material HRC move within days of release
#   MED  = potential second-order HRC effect via raw materials
#   LOW  = monitor only; small expected HRC impact
#
# DATA SOURCES FOR DATES:
#   • Fed: federalreserve.gov/monetarypolicy/fomccalendars.htm
#   • ECB: ecb.europa.eu/press/calendars/mgcgc/html/index.en.html
#   • US economic releases (CPI, NFP): bls.gov / bea.gov calendars
#   • China data: National Bureau of Statistics (around 15-18 each month)
#   • OPEC+: opec.org/opec_web/en/press_room/index.htm
#   • EIA: eia.gov/petroleum/weekly (every Wednesday 10:30 ET)
# =============================================================================

window:
  description: "Auto-rolling 45-day forward window — events filtered at runtime"

events:

  # ==========================================================================
  # APRIL 2026 — Pre-Mega-Week + Mega Week (Apr 28 – May 2)
  # ==========================================================================

  - date: "2026-04-09"
    name: "EIA Crude Oil Inventory"
    country: USA
    impact: MED
    category: commodity_supply
    consensus: "Weekly draw/build vs forecast"
    affects_regions: [china, india]
    primary_channel: oil_to_steel_input
    mechanism: |
      Oil price is an upstream input to steel production (energy + freight)
      and an indicator of broader industrial demand. Large draws push WTI/Brent
      up, lifting steel mill energy costs and freight rates. For China FOB:
      modest negative for spread (cost up). For India: same direction but
      amplified via shipping costs on imported HCC.
    expected_hrc_reaction: |
      Inventory draw of >5M barrels → mild HRC cost-push pressure over 7-14
      days. Build of >5M barrels → marginal cost relief; no immediate HRC
      follow-through.

  - date: "2026-04-10"
    name: "US CPI — March 2026"
    country: USA
    impact: HIGH
    category: inflation
    consensus: "2.8% YoY headline expected; core 3.0% YoY"
    affects_regions: [china, india]
    primary_channel: dxy_to_iron_ore
    mechanism: |
      US CPI determines the Fed's near-term rate path, which drives the
      dollar index (DXY). DXY is inversely correlated with USD-priced
      commodities — iron ore especially. Hot CPI → hawkish Fed → DXY
      strength → iron ore weakens → cheaper raw materials for Chinese mills
      (margin support, price pressure mixed). Cool CPI does the opposite.
      For India, the channel runs through INR: hot CPI → DXY strength →
      INR weakness → imported HCC INR cost rises → India spread compresses.
    expected_hrc_reaction: |
      Hot surprise (>3.0% headline): iron ore -2 to -4% in 5 trading days,
      HRC China FOB modestly weaker over 30 days, India spread compresses
      INR 500-1000/t. Cool surprise (<2.6%): iron ore +2 to +5%, China FOB
      firms, India spread benefits from INR strength.

  - date: "2026-04-11"
    name: "US PPI — March 2026"
    country: USA
    impact: MED
    category: inflation
    consensus: "Wholesale inflation; leads CPI by 1-2 months"
    affects_regions: [china, india]
    primary_channel: dxy_to_iron_ore
    mechanism: |
      PPI is upstream of CPI by 4-8 weeks. Sticky PPI signals CPI will stay
      elevated, reinforcing the Fed-hawkish chain described under CPI. Less
      market-moving than CPI on the day of release, but a strong PPI
      surprise can shift the next month's CPI expectation and pre-position
      iron ore.
    expected_hrc_reaction: |
      Material PPI surprise (>0.5% MoM beat) typically front-runs the next
      CPI cycle's iron ore move. Stand-alone HRC reaction is muted within
      first 7 days.

  - date: "2026-04-14"
    name: "China Trade Balance — March 2026"
    country: CHN
    impact: MED
    category: china_macro
    consensus: "Surplus/deficit reflects export demand & import strength"
    affects_regions: [china, india]
    primary_channel: china_export_intent
    mechanism: |
      China's trade surplus is a real-time indicator of external demand
      absorption. A widening surplus signals strong global willingness to
      absorb Chinese exports — including steel exports. A narrowing surplus
      signals export weakness, which in turn signals Chinese mills will
      redirect output to domestic market, *increasing China FOB price
      competition* and *raising risk of Chinese export dumping into India*.
      Particularly important for India: when Chinese exports are pressured,
      Indian domestic prices face import-parity squeeze.
    expected_hrc_reaction: |
      Surplus narrowing significantly → bearish for India HRC FBD via
      import pressure (-INR 500-1500/t over 30 days). Surplus expanding →
      benign for both regions; supports the "demand absorption" thesis.

  - date: "2026-04-15"
    name: "US Retail Sales — March 2026"
    country: USA
    impact: HIGH
    category: consumer
    consensus: "MoM change in headline & control group"
    affects_regions: [china]
    primary_channel: us_demand_to_china_exports
    mechanism: |
      US consumer demand is an indirect driver of Chinese steel exports
      through the durable goods supply chain. Strong retail sales (especially
      control group ex-autos/gas/building) → upstream demand for white goods,
      autos, construction inputs — all of which raise the implied global
      steel demand curve. Channel: US retail strength → Chinese export
      orders firm → China HRC FOB supported.
    expected_hrc_reaction: |
      Strong control group (>+0.5% MoM) → mild positive for China FOB over
      30-60 days. Recession-signal weak (<-0.3% MoM) → China FOB pressure
      as export demand fears materialise.

  - date: "2026-04-16"
    name: "US Fed Speakers (multiple)"
    country: USA
    impact: MED
    category: central_bank
    consensus: "Various; watch for FOMC pre-meeting tone-setting"
    affects_regions: [china, india]
    primary_channel: dxy_to_iron_ore
    mechanism: |
      Fed speakers in the days before FOMC traditionally pre-position market
      expectations. Hawkish speeches by voting members shift implied policy
      path, moving DXY ahead of the official decision.
    expected_hrc_reaction: |
      Coordinated hawkish messaging from multiple voting members → iron ore
      weakness 5-10 trading days. Single speech rarely material in isolation.

  - date: "2026-04-21"
    name: "China Q1 2026 GDP (Preliminary)"
    country: CHN
    impact: HIGH
    category: china_macro
    consensus: "Annual growth rate vs 5.0% target"
    affects_regions: [china, india]
    primary_channel: china_demand_direct
    mechanism: |
      Single most important data point for HRC of the entire 45-day window.
      China is ~55% of global steel demand. Q1 GDP signals whether the
      property/infrastructure cycle is recovering, stagnating, or
      deteriorating. Direct chain: China GDP miss → property completion
      delays → seaborne iron ore demand falls → iron ore prices drop → HRC
      China FOB drops. Cross-region effect: China weakness raises export-
      dumping risk for India FBD.
    expected_hrc_reaction: |
      GDP miss (<4.5%): iron ore -5 to -8%, HRC China FOB -$30 to -$60/t
      over 60 days, India FBD pressured INR 1500-3000/t via import
      competition. GDP beat (>5.5%): iron ore +5 to +10%, HRC China FOB +$30
      to +$70/t, India spread benefits as Chinese export pressure eases.

  - date: "2026-04-21"
    name: "China Retail Sales & Industrial Output — March"
    country: CHN
    impact: MED
    category: china_macro
    consensus: "Released alongside GDP"
    affects_regions: [china, india]
    primary_channel: china_demand_direct
    mechanism: |
      Industrial output is the more relevant of the two for HRC: it directly
      tracks Chinese steel-consuming sector activity (autos, machinery,
      shipbuilding, white goods). Industrial output miss confirms a GDP miss
      at component level and amplifies the iron ore reaction.
    expected_hrc_reaction: |
      Already partly priced via the GDP release. Material divergence (e.g.,
      GDP in line but IP miss) creates 2-day delayed iron ore reaction of
      1-3%.

  - date: "2026-04-24"
    name: "Eurozone Preliminary PMI (Mfg + Services) — April"
    country: EUR
    impact: MED
    category: manufacturing
    consensus: "Manufacturing PMI vs 50 expansion line"
    affects_regions: [china]
    primary_channel: european_steel_demand
    mechanism: |
      European manufacturing PMI is a leading indicator for European steel
      consumption, which historically absorbs 8-12% of Chinese steel exports.
      A reading sustainably below 48 signals industrial recession, which
      reduces seaborne steel demand and pressures Chinese export prices —
      indirectly weighing on HRC China FOB. Indian channel is negligible.
    expected_hrc_reaction: |
      Manufacturing PMI <48 (recession territory) → modest China FOB
      pressure ($5-15/t over 30 days). PMI >52 (expansion) → supportive.

  - date: "2026-04-28"
    name: "US PCE Deflator — March 2026"
    country: USA
    impact: HIGH
    category: inflation
    consensus: "Core PCE MoM and YoY; Fed's preferred gauge"
    affects_regions: [china, india]
    primary_channel: dxy_to_iron_ore
    mechanism: |
      PCE is the Fed's preferred inflation measure. Released the day before
      FOMC, it can pre-position the rate decision. Same DXY → iron ore chain
      as CPI, but with greater market reaction because (a) it directly
      informs FOMC, and (b) the timing is two business days before the
      meeting.
    expected_hrc_reaction: |
      Core PCE >0.3% MoM (hot): pre-positions hawkish Fed → DXY up → iron
      ore weakness sustained through FOMC week. Cool PCE (<0.2% MoM): iron
      ore rallies into FOMC. India INR moves significantly.

  - date: "2026-04-29"
    name: "FOMC Decision — April 2026"
    country: USA
    impact: HIGH
    category: central_bank
    consensus: "Hold at 3.50-3.75%; ~94% probability"
    affects_regions: [china, india]
    primary_channel: dxy_to_iron_ore
    mechanism: |
      The single most market-moving event of the Mega Week. Three things to
      watch: (1) the rate decision itself (mostly pre-priced), (2) any shift
      in forward guidance language, (3) Powell's press conference at 2:30 PM
      ET. Hawkish hold (extended "higher for longer" language) → DXY rallies
      → iron ore weakens. Dovish hold (cuts re-introduced) → DXY weakens →
      iron ore + commodities rally. Press conference often moves more than
      the decision itself.
    expected_hrc_reaction: |
      Hawkish surprise: iron ore -3 to -7% over 5 trading days; HRC China
      FOB -$15 to -$40/t over 30 days; INR weakness pressures India FBD
      spread. Dovish surprise: iron ore +5 to +8%; HRC China FOB firms;
      India spread benefits from INR rally.

  - date: "2026-04-30"
    name: "ECB Rate Decision — April 2026"
    country: EUR
    impact: MED
    category: central_bank
    consensus: "Hold expected at 2.0%; oil shock has pushed CPI forecast to 2.6%"
    affects_regions: [china]
    primary_channel: european_steel_demand
    mechanism: |
      ECB policy stance affects the European industrial demand outlook through
      financing conditions for construction and capex. Hawkish ECB → tighter
      EU industrial activity → weaker European steel imports from China.
      Channel is slower (months not weeks) and less reliable than the FOMC
      → DXY → iron ore chain.
    expected_hrc_reaction: |
      Direct HRC impact within 30 days is small (<1% China FOB). Worth
      watching mainly for the cumulative European demand picture across
      multiple ECB meetings.

  - date: "2026-04-30"
    name: "US Q1 2026 GDP — Advance Estimate"
    country: USA
    impact: HIGH
    category: gdp
    consensus: "First Q1 GDP print"
    affects_regions: [china]
    primary_channel: us_demand_to_china_exports
    mechanism: |
      Defines the broad US demand backdrop that flows through to Chinese
      steel exports via durable goods imports. A miss (<1.5% annualised)
      signals US slowdown; combined with hawkish Fed creates stagflation
      narrative that weighs on global commodity demand including iron ore.
      A beat (>2.5%) is supportive for China FOB.
    expected_hrc_reaction: |
      GDP miss + hawkish Fed combo: amplifies the iron ore weakness from
      FOMC reaction; HRC China FOB pressured. Beat: stabilising for China
      FOB.

  - date: "2026-05-02"
    name: "US Non-Farm Payrolls — April 2026"
    country: USA
    impact: HIGH
    category: employment
    consensus: "Headline payrolls + unemployment + average hourly earnings"
    affects_regions: [china, india]
    primary_channel: dxy_to_iron_ore
    mechanism: |
      The single biggest monthly mover of the dollar. Strong NFP (>200K +
      stable unemployment + firm wage growth) → hawkish Fed pricing → DXY up
      → iron ore down. Weak NFP → recession fears + dovish Fed pricing →
      DXY down → iron ore up. The wage-growth component (average hourly
      earnings) is critical: hot wages signal sticky inflation regardless
      of headline. India sees the move via INR.
    expected_hrc_reaction: |
      Strong NFP combined with hot wages (>4% YoY): iron ore -2 to -5%
      within 5 trading days. Weak NFP (<100K): iron ore +3 to +6%. Reaction
      tends to "fakeout" first 15 minutes then reverse.

  # ==========================================================================
  # MAY 2026 — Post Mega-Week, FOMC Aftermath
  # ==========================================================================

  - date: "2026-05-05"
    name: "US ISM Services PMI — April"
    country: USA
    impact: MED
    category: manufacturing
    consensus: "Services > 70% of US economy; sub-50 signals contraction"
    affects_regions: [china]
    primary_channel: us_demand_to_china_exports
    mechanism: |
      Services is the larger component of US GDP and a sustained sub-50 reading
      signals broad economic contraction. Channel to HRC is indirect: services
      slowdown → consumer spending pullback → durable goods demand → steel-
      consuming sector weakness → reduced Chinese export pull. Released 3 days
      after NFP, often confirms or contradicts the labour market signal.
    expected_hrc_reaction: |
      Sub-48 reading signals genuine recession risk — modest negative for
      China FOB over 30-60 days ($5-10/t). Above 52 is reassuring, no
      material HRC reaction.

