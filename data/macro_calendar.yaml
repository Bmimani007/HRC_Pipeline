    impact: MED
    category: inflation
    consensus: "Wholesale inflation; leads CPI by 1-2 months"
    affects_regions: [china, india]
    primary_channel: dxy_to_iron_ore
    mechanism: |
      PPI is upstream of CPI by 4-8 weeks. Sticky PPI signals CPI will stay
      elevated, reinforcing the Fed-hawkish chain. Less market-moving than
      CPI on the day of release, but a strong PPI surprise can shift the
      next month's CPI expectation and pre-position iron ore.
    expected_hrc_reaction: |
      Material PPI surprise (>0.5% MoM beat) typically front-runs the next
      CPI cycle's iron ore move. Stand-alone HRC reaction muted within
      first 7 days.

  - date: "2026-05-15"
    name: "China Industrial Output / Retail Sales / FAI — April"
    country: CHN
    impact: HIGH
    category: china_macro
    consensus: "Headline IP YoY; retail sales YoY; fixed-asset investment YTD"
    affects_regions: [china, india]
    primary_channel: china_demand_direct
    mechanism: |
      Industrial output (IP) is the most relevant Chinese data point for HRC
      between GDP releases. IP directly tracks Chinese steel-consuming sector
      activity (autos, machinery, shipbuilding, white goods, construction-
      related industrial production). An IP miss triggers iron ore weakness
      within 24 hours and HRC FOB pressure over the following 30 days. Fixed-
      asset investment (FAI) captures the construction/infrastructure pulse
      — direct steel consumption proxy.
    expected_hrc_reaction: |
      IP miss (<5.5% YoY): iron ore -3 to -5% within 5 trading days, HRC
      China FOB -$10 to -$25/t over 30 days. IP beat (>6.5%): iron ore
      +2 to +4%, HRC firms. FAI weakness signals deeper construction
      slowdown — same direction as IP but slower-acting (60-90 day window).

